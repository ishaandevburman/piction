<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>piction</title>
<link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
<div id="join-modal">
  <div id="join-card">
    <h1>piction</h1>
    <p id="join-room-label"></p>
    <input type="text" id="join-name-input" placeholder="Your name" maxlength="24" autofocus>
    <button id="join-btn">Join</button>
  </div>
</div>
<div id="app" style="display:none">
  <div id="toolbar">
    <span id="room-label"></span>
    <span id="name-display"></span>
    <span id="status" class="disconnected">Disconnected</span>
  </div>
  <div id="lobby">
    <h2>Players</h2>
    <div id="player-list"></div>
    <button id="start-game-btn" style="display:none">Start Game</button>
    <p id="waiting-msg">Waiting for host to start the game...</p>
  </div>
  <div id="game-area" style="display:none">
    <div id="game-info">
      <span id="game-state-label"></span>
      <span id="drawer-label"></span>
      <span id="word-info"></span>
      <span id="timer-display"></span>
    </div>
    <div id="draw-toolbar" style="display:none">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="brush">Brush</button>
        <button class="tool-btn" data-tool="eraser">Eraser</button>
      </div>
      <div class="tool-group" id="palette-swatches"></div>
      <div class="tool-group">
        <label>Size: <input type="range" id="size-slider" min="1" max="50" value="4"> <span id="size-display">4</span></label>
      </div>
      <button id="clear-canvas-btn">Clear</button>
    </div>
    <div id="game-main">
      <div id="game-canvas-area">
        <canvas id="canvas"></canvas>
        <div id="word-choice" style="display:none">
          <h2>Pick a word to draw</h2>
          <div id="word-buttons"></div>
        </div>
        <div id="picking-wait" style="display:none">
          <p>Drawer is picking a word...</p>
        </div>
      </div>
      <div id="sidebar">
      <div id="scoreboard"></div>
      <div id="reveal-area" style="display:none">
        <button id="next-round-btn" style="display:none">Next Round</button>
        <p id="waiting-next-round" style="display:none">Waiting for host to start next round...</p>
      </div>
      <div id="chat">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
          <input type="text" id="chat-input" placeholder="Type your guess..." disabled>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/static/script.js?v=2"></script>
</body>
</html>
